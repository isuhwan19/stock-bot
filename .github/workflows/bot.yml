name: Stock Bot

on:
  schedule:
    # 1. 오전 8:00 알림을 위해 7:45에 서버 깨움 (UTC 22:45)
    - cron: '45 22 * * *'
    # 2. 오후 3:10 알림을 위해 2:55에 서버 깨움 (UTC 05:55)
    - cron: '55 5 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 yfinance pandas

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
