# .github/workflows/bot.yml 수정안
name: Stock Bot

on:
  schedule:
    - cron: '45 22 * * *'  # 오전 7:45 (8시 알림용)
    - cron: '50 5 * * 1-5' # 오후 2:50 (예비)
    - cron: '55 5 * * 1-5' # 오후 2:55 (예비)
    - cron: '0 6 * * 1-5'  # 오후 3:00 (예비)
    - cron: '5 6 * * 1-5'  # 오후 3:05 (예비)
    - cron: '10 6 * * 1-5' # 오후 3:10 (메인)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 yfinance pandas

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
