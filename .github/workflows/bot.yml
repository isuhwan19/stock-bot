name: Stock Bot

on:
  schedule:
    # 1. 한국 시간 08:00 (UTC 23:00)
    # 2. 한국 시간 15:10 (UTC 06:10)
    - cron: '0 23 * * *'
    - cron: '10 6 * * 1-5' 
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 라이브러리 설치 및 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          pip install requests yfinance  # <--- yfinance를 추가했습니다!
          python main.py
