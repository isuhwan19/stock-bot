name: Stock Bot

on:
  schedule:
    # 1. 한국 시간 08:00 (미국 증시 리포트) - 매일
    - cron: '0 23 * * *'
    # 2. 한국 시간 08:40 (국장 개장 전 알림) - 월~금
    - cron: '25 23 * * 1-5'
    # 3. 한국 시간 15:10 (종가매매 분석 - 정시 실행용) - 월~금
    - cron: '55 5 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 yfinance pandas

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
