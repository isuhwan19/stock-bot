name: Stock Bot

on:
  schedule:
    - cron: '0 23 * * *'      # 한국 시간 오전 08:00 (월~일)
    - cron: '10 6 * * 1-5'    # 한국 시간 오후 15:10 (월~금)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 라이브러리 설치 및 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # 필요한 라이브러리 3개를 한꺼번에 설치합니다.
          pip install requests yfinance beautifulsoup4
          python main.py
